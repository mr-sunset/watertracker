<!DOCTYPE html>

<html lang="en">
    <head>
        <title>WaterTrack</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h1>WaterTrack</h1>
            <p>🩵 JC</p>

        <main>

            <button id="log-button">Log</button>

            <img src="settings-icon.svg" alt="Settings icon" id="settings-icon" height="25">
        </main>

        <script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script> <!-- Confetti -->
        <script src="script.js"></script>
